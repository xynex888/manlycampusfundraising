<style>
  :root{
    --royal:#0045AB; --royal-deep:#00337f;
    --orange:#FF711A; --orange-deep:#e8600c;
    --ice:#D8E7E8; --ice-deep:#c3dadf;
    --snow:#EEFEFE; --line:#AAD4ED;
    --ink:#0a2342; --muted:#5b7791; --card:#ffffff;
    --shadow:0 10px 30px rgba(0,51,127,.14);
    --shadow-lg:0 18px 50px rgba(0,51,127,.20);
    --green:#dce9ea;   /* ice-green, sampled from the artwork */
    --font:"DM Sans", system-ui, sans-serif;   /* clean, no bubble */
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}   /* no overflow clip — page has no horizontal overflow, and any overflow here breaks the sticky gate */
  body{margin:0;font-family:var(--font);font-weight:500;color:var(--ink);
    background:var(--royal-deep);   /* dark lower section (existing palette blue); fixed banner/gate keep their --green bg */
    background-attachment:fixed}
  h2{margin:0}

  /* ambient snow over the light body */
  .snow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .flake{position:absolute;top:-5vh;color:#fff;opacity:.85;filter:drop-shadow(0 1px 1px rgba(0,51,127,.10));animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(-5vh) translateX(0) rotate(0)}100%{transform:translateY(108vh) translateX(4vw) rotate(220deg)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}

  .wrap{position:relative;z-index:1}

  /* ---------- FIXED TOP BAR: whole banner + divider stay pinned ---------- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;background:var(--green);
    box-shadow:0 6px 16px -10px rgba(0,69,171,.40)}
  .topbar-spacer{width:100%}   /* height set by JS = topbar height, so the wall starts below it */

  .banner{background:var(--green);width:100%;display:flex;justify-content:center}
  .banner img{display:block;width:100%;max-width:600px;height:auto}   /* banner GFX cap lowered — was too large at its widest */

  /* the divider + bobbing arrows, now the bottom edge of the fixed top bar */
  .gate{display:flex;align-items:center;gap:clamp(14px,3vw,26px);max-width:100%;
    margin:-18px auto 0;padding:2px 24px clamp(8px,1.6vw,14px);background:var(--green)}   /* pull up to eat the banner PNG's transparent bottom + trim top padding */
  .gate .rule{flex:1;height:2px;background:var(--line);border-radius:2px}
  .gate .down{flex:0 0 auto;width:clamp(20px,4vw,26px);height:auto;color:var(--orange);animation:bob 1.6s ease-in-out infinite}

  /* ---------- SPONSOR WALL (pyramid cascade: 2 → 3 → 4 → 4 → 5… sorted by $) ---------- */
  .wall{max-width:1180px;margin:0 auto;padding:clamp(8px,2vw,16px) 18px clamp(26px,5vw,52px)}
  /* grid-template-columns is set inline per row by render() = repeat(rowCount, var(--cw)) */
  .band{display:grid;justify-content:center;align-items:stretch;gap:clamp(10px,1.8vw,20px);margin-bottom:clamp(12px,2.4vw,24px)}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:1px solid rgba(170,212,237,.55);
    position:relative;display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;text-decoration:none;color:var(--ink);
    transition:transform .18s ease,box-shadow .18s ease}
  a.card:hover,a.card:focus-visible{transform:translateY(-5px);box-shadow:var(--shadow-lg);outline:none}
  a.card:focus-visible{box-shadow:0 0 0 3px var(--orange),var(--shadow-lg)}
  .logo{flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px;width:100%}
  .logo img{display:block;max-width:100%;max-height:100%;object-fit:contain}
  .name{font-weight:700;color:var(--royal);line-height:1.12}
  .card.row{flex-direction:row;text-align:left}
  .card.row .logo{width:auto;aspect-ratio:1/1}
  .card.col{flex-direction:column;text-align:center}
  .card.textonly{justify-content:center;align-items:center}
  /* location line + category tag — pinned to the bottom of the tile (location sits above the tag) */
  .type{position:absolute;left:8px;right:8px;bottom:7px;text-align:center;font-size:10px;font-weight:800;
    letter-spacing:.09em;text-transform:uppercase;color:var(--muted);line-height:1.1;pointer-events:none}
  .loc{position:absolute;left:8px;right:8px;bottom:7px;text-align:center;font-size:11px;font-weight:600;
    color:#54707f;line-height:1.1;pointer-events:none}
  .card.hastype .loc{bottom:21px}            /* lift the location above the tag when both are present */
  .band .card.hastype{padding-bottom:22px}   /* reserve room so the tag never overlaps the name */
  .band .card.hasloc{padding-bottom:22px}
  .band .card.hastype.hasloc{padding-bottom:36px}   /* room for both lines */

  /* per-row sizing: card width (--cw) + logo + type all shrink as rows widen */
  .band.n2{--cw:clamp(200px,30vw,330px)} .n2 .card{min-height:176px} .n2 .logo{height:116px} .n2 .name{font-size:clamp(18px,2.2vw,24px)}
  .band.n3{--cw:clamp(150px,21vw,232px)} .n3 .card{min-height:142px} .n3 .logo{height:90px}  .n3 .name{font-size:clamp(16px,1.9vw,20px)}
  .band.n4{--cw:clamp(120px,16vw,174px)} .n4 .card{min-height:114px;padding:12px} .n4 .logo{height:66px} .n4 .name{font-size:clamp(14px,1.6vw,17px)}
  .band.n5{--cw:clamp(96px,13vw,140px)}  .n5 .card{min-height:96px;padding:10px} .n5 .logo{height:50px} .n5 .name{font-size:clamp(13px,1.4vw,15px)}

  /* mobile: cascade can't hold wide rows — collapse the column count, cards stretch to fill */
  @media(max-width:620px){
    .band{grid-template-columns:repeat(2,minmax(0,1fr))!important}
    .band.n2{grid-template-columns:1fr!important}
    .band.n5{grid-template-columns:repeat(3,minmax(0,1fr))!important}
  }

  /* ---------- HUGE CLICK HERE (your graphic drops in; big fallback meanwhile) ---------- */
  .cta{text-align:center;padding:clamp(20px,4vw,44px) 16px clamp(48px,9vw,88px)}
  .bigcta{display:inline-block;width:100%;max-width:760px;margin:0 auto;text-decoration:none;border-radius:24px;transition:transform .16s ease}
  .bigcta img{display:block;width:100%;height:auto}
  .tixinfo{display:block;width:100%;max-width:720px;height:auto;margin:0 auto clamp(20px,4vw,36px)}
  .bigcta:hover,.bigcta:focus-visible{transform:translateY(-3px);outline:none}
  .bigcta:focus-visible{box-shadow:0 0 0 4px rgba(0,69,171,.45)}
  .txtlink{display:inline-block;color:var(--orange);font-weight:800;font-size:clamp(24px,7vw,46px);text-decoration:underline}

  footer{text-align:center;padding:0 20px 44px;color:#8a96a1;font-size:13px;font-weight:600}

  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .gate .down,.flake{animation:none!important}
    .card{opacity:1;transform:none}
  }
</style>

function resolveLogo(v){ if(!v) return ""; if(/^data:|^https?:\/\//.test(v)) return v; return CONFIG.logoBase + v; }
function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c=='"'&&text[i+1]=='"'){cur+='"';i++;} else if(c=='"'){q=false;} else cur+=c; }
    else{ if(c=='"')q=true; else if(c==',') {row.push(cur);cur="";}
      else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur="";} else if(c=='\r'){} else cur+=c; } }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  if(!rows.length) return [];
  // Find the header row — skip any leading title/blank rows (e.g. a "2026 FUNDRAISING"
  // banner row the template puts above the columns). Header = first row naming Name + Tier.
  let hi=rows.findIndex(r=>{const s=r.map(x=>x.trim().toLowerCase());return s.includes("name")&&s.includes("tier");});
  if(hi<0) hi=0;
  const head=rows[hi].map(h=>h.trim().toLowerCase());
  return rows.slice(hi+1).filter(r=>r.some(x=>x.trim()!="")).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});
}
function isActive(v){ return /^(y|yes|true|1|active|on|x|live)$/i.test(String(v==null?"":v).trim()); }
function normalise(rows){
  return rows.map(r=>({ name:r.name||"",
    // publish gate: a row shows only when Active is affirmatively yes. Absent column (SAMPLE) = shown.
    active:(r.active===undefined ? true : isActive(r.active)),
    amount:Number(String(r.amount||"0").replace(/[^0-9.]/g,""))||0,  // sort key WITHIN a tier; never shown
    tier:(/^[A-D]$/i.test(String(r.tier||"").trim()) ? String(r.tier).trim().toUpperCase() : "D"),  // A=biggest band … D=smallest; blank/invalid -> D
    location:(r.location||r.area||r.suburb||"").trim(),   // place line above the type tag
    type:(r.type||r.category||"").trim(),   // RAFFLE / SILENT AUCTION / SUPPORTER tag
    logo:resolveLogo(r.logo||r.logourl||""), website:(w=>{w=String(r.website||r.url||"").trim();return w&&!/^https?:\/\//i.test(w)?"https://"+w:w;})() })).filter(s=>s.name && s.active);
}
function makeCard(s){
  const link=s.website&&s.website!="#";
  const el=document.createElement(link?"a":"div"); el.className="card";
  if(link){el.href=s.website;el.target="_blank";el.rel="noopener";el.setAttribute("aria-label",s.name+" (opens in new tab)");}
  let type=null;
  if(s.type){ el.classList.add("hastype"); type=document.createElement("div"); type.className="type"; type.textContent=s.type; }
  let loc=null;
  if(s.location){ el.classList.add("hasloc"); loc=document.createElement("div"); loc.className="loc"; loc.textContent=s.location; }
  if(!s.logo){ el.classList.add("col","textonly");
    const n=document.createElement("div");n.className="name";n.textContent=s.name;el.appendChild(n);
    if(loc)el.appendChild(loc); if(type)el.appendChild(type);return el; }
  const wrap=document.createElement("div");wrap.className="logo";
  const img=document.createElement("img");img.alt=s.name;img.loading="lazy";img.src=s.logo;
  const n=document.createElement("div");n.className="name";n.textContent=s.name;
  el.classList.add("col");
  img.addEventListener("load",()=>{const r=img.naturalWidth/(img.naturalHeight||1);if(r<1.4){el.classList.remove("col");el.classList.add("row");}});
  img.addEventListener("error",()=>{el.classList.remove("row");el.classList.add("col","textonly");wrap.remove();});
  wrap.appendChild(img);el.appendChild(wrap);el.appendChild(n);
  if(loc)el.appendChild(loc); if(type)el.appendChild(type);return el;
}
// Tier = size band + how many sit per row. A biggest (2/row) … D smallest (5/row).
const TIERS=[{t:"A",n:2},{t:"B",n:3},{t:"C",n:4},{t:"D",n:5}];
function render(sponsors){
  const wall=document.getElementById("wall");wall.innerHTML="";
  TIERS.forEach(({t,n})=>{
    // this tier's sponsors, ordered by $ desc (ties keep sheet order via stable index)
    const list=sponsors.map((s,i)=>({s,i})).filter(x=>x.s.tier===t)
      .sort((a,b)=>(b.s.amount-a.s.amount)||(a.i-b.i)).map(x=>x.s);
    for(let idx=0; idx<list.length; idx+=n){
      const slice=list.slice(idx,idx+n);
      const band=document.createElement("div");
      band.className="band n"+n;
      band.style.gridTemplateColumns="repeat("+slice.length+",var(--cw))";  // centres full AND partial rows
      slice.forEach(s=>band.appendChild(makeCard(s)));
      wall.appendChild(band);
    }
  });
}
async function boot(){
  // try the Google Sheet first, then the local CSV, then the built-in SAMPLE
  let data=SAMPLE;
  for(const url of [CONFIG.sheetCsvUrl, CONFIG.localCsv].filter(Boolean)){
    try{
      const res=await fetch(url,{cache:"no-store"});
      if(res.ok){ const parsed=parseCSV(await res.text()); if(normalise(parsed).length){ data=parsed; break; } }
    }catch(e){ console.warn("Source failed, trying next:",url,e); }
  }
  render(normalise(data));   // normalise exactly once (data is raw rows here, never pre-normalised)
}
boot();

/* ---------- Keep the wall clear of the fixed top bar ----------
   The whole top (banner + divider) is position:fixed, so it's out of flow. Match the
   spacer's height to the top bar so the sponsor wall starts right below it, and keep it
   in sync as the banner image loads / the window resizes. */
(function(){
  const topbar=document.getElementById("topbar"),
        spacer=document.getElementById("topbarSpacer");
  if(!topbar||!spacer) return;
  function sync(){ spacer.style.height = topbar.offsetHeight+"px"; }
  sync();
  addEventListener("resize",sync);
  window.addEventListener("load",sync);
  const bimg=topbar.querySelector(".banner img");
  if(bimg && !bimg.complete) bimg.addEventListener("load",sync);
  if("ResizeObserver" in window) new ResizeObserver(sync).observe(topbar);
})();

(function(){ if(matchMedia("(prefers-reduced-motion:reduce)").matches) return;
  const c=document.getElementById("snow"),N=26,marks=["\u2744","\u2745","\u2746","\u2022"];
  for(let i=0;i<N;i++){const f=document.createElement("span");f.className="flake";f.textContent=marks[i%marks.length];
    f.style.left=Math.random()*100+"vw";f.style.fontSize=(8+Math.random()*16)+"px";f.style.opacity=(.4+Math.random()*.5).toFixed(2);
    const d=(8+Math.random()*10).toFixed(1);f.style.animationDuration=d+"s";f.style.animationDelay=(-Math.random()*d)+"s";c.appendChild(f);} })();
</script>
