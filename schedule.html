<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manly Fundraising — To-Do by Date</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230045AB'/%3E%3Ctext%20x='16'%20y='23'%20font-size='22'%20text-anchor='middle'%3E%E2%9D%84%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--royal:#0045AB;--orange:#F26C21;--ink:#1d2330;--muted:#6b7480;--line:#e6e9ef;--bg:#f4f6fa;--card:#fff}
*{box-sizing:border-box}
body{margin:0;font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg)}
.banner{background:var(--royal);text-align:center}
.banner img{display:block;width:100%;max-width:900px;margin:0 auto;height:auto}
header.head{background:var(--royal);color:#fff;padding:18px 20px;text-align:center}
header.head h1{margin:0;font-size:clamp(20px,3.4vw,30px);font-weight:800;letter-spacing:.5px}
header.head p{margin:4px 0 0;opacity:.85;font-size:13px}
.wrap{max-width:1180px;margin:0 auto;padding:16px}
.nav{margin-bottom:10px;font-size:13px;color:var(--muted)}
.nav a{color:var(--royal);font-weight:700;text-decoration:none}
.nav b{color:var(--ink)}
.bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:600;color:var(--muted)}
.chip b{color:var(--ink)}
.sort{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted)}
.sort button{font:inherit;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;padding:6px 11px;cursor:pointer}
.sort button.on{background:var(--royal);color:#fff;border-color:var(--royal)}
.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:auto}
table{border-collapse:collapse;width:100%;font-size:14.5px;min-width:760px}
thead th{position:sticky;top:0;background:#eef2f8;text-align:left;padding:10px 12px;font-weight:700;color:var(--royal);border-bottom:2px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.4px}
thead th .arr{opacity:.5;font-size:11px}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:#fafbfe}
td.name{font-weight:700;min-width:200px}
td.datehero{white-space:nowrap;min-width:130px;font-weight:800;color:var(--royal)}
td.ask{min-width:240px;color:#39414f}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;background:#eceff4;color:#55606e}
.s-plan{background:#eef1f6;color:#5b6675}
.s-doing,.s-inprogress{background:#fff3e0;color:#b3600f}
.s-blocked{background:#fde9e9;color:#b13838}
.s-done{background:#e3f7e8;color:#1c7a3a}
.note{color:var(--muted);font-size:12px;text-align:center;padding:16px}
.err{color:#b13838}
.gate{position:fixed;inset:0;background:var(--royal);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.gatebox{background:#fff;border-radius:14px;padding:26px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.gatebox h2{margin:0 0 2px;color:var(--royal);font-size:20px}
.gatebox p{margin:0 0 14px;color:var(--muted);font-size:13px}
.gatebox input{width:100%;padding:11px 12px;margin:6px 0;border:1px solid var(--line);border-radius:9px;font:inherit}
.gatebox button{width:100%;padding:11px;margin-top:10px;border:0;border-radius:9px;background:var(--orange);color:#fff;font:inherit;font-weight:700;cursor:pointer}
.gerr{color:#b13838;font-size:12.5px;min-height:16px;margin-top:8px}
body.locked{overflow:hidden}
</style>
</head>
<body class="locked">
<div id="gate" class="gate"><form class="gatebox" onsubmit="return false">
  <h2>Manly Fundraising</h2><p>Team access</p>
  <input id="gu" placeholder="Username" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
  <input id="gp" type="password" placeholder="Password" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false">
  <button id="glogin" type="button">Enter</button>
  <div id="gerr" class="gerr"></div>
</form></div>
<!-- Banner GFX slot — operator drops assets/schedule-banner.png; hidden until present -->
<div class="banner"><img id="banner" src="assets/schedule-banner.png?v=1" alt="" onerror="this.parentNode.style.display='none'"></div>
<header class="head"><h1>To-Do by Date</h1><p>Everything still to do — soonest first. Done items hidden. Read only.</p></header>
<div class="wrap">
  <div class="nav"><a href="/plan">◂ Grouped worklist</a> · <b>By date — to-do list</b></div>
  <div class="bar">
    <div class="chips" id="chips"></div>
    <div class="sort">Sort: <button data-sort="date due" class="on">Date</button><button data-sort="phase">Phase</button><button data-sort="owner">Owner</button><button data-sort="status">Status</button></div>
  </div>
  <div class="tablewrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="note" id="foot">Loading…</div>
</div>
<script>
const CONFIG={
  csvUrl:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSju0_iS7aWmos6Dpqtvk13CV_vUTYSmbnboCfeNY-iHtb2i5Bvrw8z7mPYPOpki2e-B1AOsElnSKvS/pub?output=csv",
  headerHas:["phase","owner"],
  statusKey:"status",
  statusOrder:["plan","doing","in progress","blocked","done"],
  idKey:"item",
  dateKey:"date due",
  columns:[
    {key:"phase",label:"Phase"},
    {key:"date due",label:"Date",cls:"datehero"},
    {key:"owner",label:"Owner"},
    {key:"status",label:"Status",badge:true},
    {key:"item",label:"Item",cls:"name"},
    {key:"cost",label:"Cost"},
    {key:"amount",label:"Amount"},
    {key:"unresolved / notes",label:"Notes",cls:"ask"}
  ]
};
const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function dateVal(s){
  s=String(s||"").trim(); if(!s)return 999999;                 // undated → bottom
  const m=s.match(/(\d{1,2})\s*([A-Za-z]{3})/);
  if(!m)return 999998;
  const mon=MONTHS[m[2].toLowerCase()]; if(mon===undefined)return 999998;
  return mon*100+parseInt(m[1],10);
}
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c=='"'&&text[i+1]=='"'){cur+='"';i++;}else if(c=='"'){q=false;}else cur+=c;}
    else{if(c=='"')q=true;else if(c==','){row.push(cur);cur="";}
      else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c=='\r'){}else cur+=c;}}
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  if(!rows.length)return[];
  const norm=s=>s.trim().toLowerCase().replace(/\s+/g,' ');
  let hi=rows.findIndex(r=>{const s=r.map(norm);return CONFIG.headerHas.every(h=>s.includes(h));});
  if(hi<0)hi=0;
  const head=rows[hi].map(norm);
  return rows.slice(hi+1).filter(r=>r.some(x=>x.trim()!="")).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||"").trim());return o;});
}
function statusClass(v){return "s-"+String(v||"").toLowerCase().replace(/[^a-z]/g,"");}
function statusRank(v){const i=CONFIG.statusOrder.indexOf(String(v||"").toLowerCase());return i<0?CONFIG.statusOrder.length:i;}
let DATA=[],sortKey="date due",sortDir=1;
function render(){
  const rows=DATA.slice().sort((a,b)=>{
    let d;
    if(sortKey===CONFIG.dateKey){d=dateVal(a[sortKey])-dateVal(b[sortKey]);if(!d)d=String(a[CONFIG.idKey]||"").localeCompare(String(b[CONFIG.idKey]||""));}
    else if(sortKey===CONFIG.statusKey){d=statusRank(a[sortKey])-statusRank(b[sortKey]);if(!d)d=dateVal(a[CONFIG.dateKey])-dateVal(b[CONFIG.dateKey]);}
    else{d=String(a[sortKey]||"").localeCompare(String(b[sortKey]||""),undefined,{sensitivity:"base"});if(!d)d=dateVal(a[CONFIG.dateKey])-dateVal(b[CONFIG.dateKey]);}
    return d*sortDir;
  });
  document.getElementById("thead").innerHTML="<tr>"+CONFIG.columns.map(c=>`<th data-sort="${c.key}">${c.label} <span class="arr">${sortKey===c.key?(sortDir>0?"▾":"▴"):""}</span></th>`).join("")+"</tr>";
  document.getElementById("tbody").innerHTML=rows.map(r=>"<tr>"+CONFIG.columns.map(c=>{
    let v=r[c.key]||"";
    if(c.badge)return `<td><span class="badge ${statusClass(v)}">${esc(v)||"—"}</span></td>`;
    return `<td class="${c.cls||""}">${esc(v)}</td>`;
  }).join("")+"</tr>").join("");
  const counts={};DATA.forEach(r=>{const s=(r[CONFIG.statusKey]||"—").trim()||"—";counts[s]=(counts[s]||0)+1;});
  document.getElementById("chips").innerHTML=`<span class="chip"><b>${DATA.length}</b> to do</span>`+
    Object.entries(counts).sort((a,b)=>statusRank(a[0])-statusRank(b[0])).map(([s,n])=>`<span class="chip">${esc(s)} <b>${n}</b></span>`).join("");
  document.querySelectorAll("[data-sort]").forEach(b=>b.classList.toggle("on",b.getAttribute("data-sort")===sortKey));
  document.getElementById("foot").textContent=rows.length+" items to do (Done hidden) · updates when the sheet is edited";
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
document.addEventListener("click",e=>{const b=e.target.closest("[data-sort]");if(b){const k=b.getAttribute("data-sort");if(k===sortKey)sortDir*=-1;else{sortKey=k;sortDir=1;}render();}});
async function boot(){
  try{
    const res=await fetch(CONFIG.csvUrl,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    DATA=parseCSV(await res.text()).filter(r=>(r[CONFIG.idKey]||"").trim() && String(r[CONFIG.statusKey]||"").trim().toLowerCase()!=="done");
    if(!DATA.length){document.getElementById("foot").textContent="Nothing outstanding — all done!";return;}
    render();
  }catch(err){document.getElementById("foot").innerHTML='<span class="err">Could not load the sheet: '+esc(err.message)+'</span>';}
}
const CREDS={user:"raise",pass:"moneynow"};
function showApp(){document.getElementById("gate").style.display="none";document.body.classList.remove("locked");boot();}
function tryLogin(){const u=(document.getElementById("gu").value||"").trim(),p=document.getElementById("gp").value||"";if(u===CREDS.user&&p===CREDS.pass){sessionStorage.setItem("mcf_auth","1");showApp();}else{document.getElementById("gerr").textContent="Wrong username or password.";}}
if(sessionStorage.getItem("mcf_auth")==="1"){showApp();}
else{document.getElementById("glogin").addEventListener("click",tryLogin);document.getElementById("gp").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});document.getElementById("gu").focus();}
</script>
</body>
</html>
